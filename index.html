<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rupee Command Center</title>
    <style>
      :root {
        color-scheme: dark;
        --brand: #07BB67;
        --brand-2: #34d399;
        --bg: #08110f;
        --shell: #0b1412;
        --panel: rgba(15, 24, 22, 0.92);
        --panel-strong: #111d1a;
        --surface: rgba(255, 255, 255, 0.055);
        --line: rgba(255, 255, 255, 0.12);
        --ink: #f4fff9;
        --muted: #a9bbb2;
        --soft: #778981;
        --danger: #ff5b73;
        --warn: #f5b84b;
        --ok: #07BB67;
        --shadow: 0 22px 72px rgba(0, 0, 0, 0.42);
        --button-ink: #03140b;
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --brand: #092C95;
        --brand-2: #2d5ee8;
        --bg: #f5f7ff;
        --shell: #ffffff;
        --panel: rgba(255, 255, 255, 0.94);
        --panel-strong: #ffffff;
        --surface: rgba(9, 44, 149, 0.055);
        --line: rgba(9, 44, 149, 0.14);
        --ink: #071331;
        --muted: #55627a;
        --soft: #78849a;
        --danger: #c9273f;
        --warn: #946200;
        --ok: #087a46;
        --shadow: 0 20px 64px rgba(9, 44, 149, 0.13);
        --button-ink: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 0%, color-mix(in srgb, var(--brand), transparent 78%), transparent 32%),
          radial-gradient(circle at 90% 8%, color-mix(in srgb, var(--brand-2), transparent 84%), transparent 28%),
          linear-gradient(135deg, var(--bg), var(--shell));
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 22px 16px;
        border-right: 1px solid var(--line);
        background: color-mix(in srgb, var(--shell), transparent 5%);
      }

      .brand-block {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-bottom: 26px;
      }

      .brand-mark,
      .avatar {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 14px;
        color: var(--button-ink);
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        font-weight: 900;
        box-shadow: 0 12px 34px color-mix(in srgb, var(--brand), transparent 65%);
      }

      .brand-block strong {
        display: block;
      }

      .brand-block span,
      .muted {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .nav-list {
        display: grid;
        gap: 8px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 42px;
        border: 0;
        border-radius: 12px;
        padding: 0 12px;
        color: var(--muted);
        background: transparent;
        text-align: left;
        font-weight: 800;
      }

      .nav-item.active,
      .nav-item:hover {
        color: var(--ink);
        background: var(--surface);
      }

      .main {
        min-width: 0;
        padding: 20px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }

      .topbar h1 {
        margin: 0;
        font-size: clamp(1.55rem, 3vw, 2.45rem);
        letter-spacing: 0;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .month-picker,
      .search-input,
      input,
      select {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0 12px;
        color: var(--ink);
        background: var(--surface);
        outline: none;
      }

      input:focus,
      select:focus,
      button:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--brand), transparent 70%);
        outline-offset: 2px;
      }

      .theme-switch {
        --shift: 0px;
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        min-width: 112px;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 13px 0 48px;
        color: var(--ink);
        background: var(--surface);
        font-weight: 900;
      }

      .theme-switch span {
        position: absolute;
        left: 8px;
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        color: var(--button-ink);
        background: var(--brand);
        transform: translateX(var(--shift));
        transition: transform 260ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      :root[data-theme="light"] .theme-switch {
        --shift: 70px;
        padding: 0 48px 0 13px;
      }

      .primary-button,
      .secondary-button,
      .danger-button,
      .icon-button {
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 0 14px;
        font-weight: 900;
      }

      .primary-button {
        color: var(--button-ink);
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        box-shadow: 0 14px 36px color-mix(in srgb, var(--brand), transparent 74%);
      }

      .secondary-button,
      .icon-button {
        color: var(--ink);
        background: var(--surface);
        border-color: var(--line);
      }

      .danger-button {
        color: #ffffff;
        background: linear-gradient(135deg, var(--danger), #ff9f1c);
      }

      .content-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(340px, 0.65fr);
        gap: 16px;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        gap: 12px;
        padding: 18px 18px 0;
      }

      .card-title {
        margin: 0;
        font-size: 1rem;
      }

      .card-subtitle {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.88rem;
      }

      .card-body {
        padding: 18px;
      }

      .hero-card {
        position: relative;
        overflow: hidden;
        min-height: 290px;
        background:
          radial-gradient(circle at 10% 12%, color-mix(in srgb, var(--brand), transparent 68%), transparent 34%),
          linear-gradient(135deg, color-mix(in srgb, var(--panel-strong), var(--brand) 9%), var(--panel));
      }

      .hero-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 16px;
        align-items: end;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--brand);
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      .hero-number {
        margin: 0;
        font-size: clamp(2.6rem, 7vw, 5.7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .hero-copy {
        max-width: 640px;
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 1.02rem;
        line-height: 1.55;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
      }

      .stat-card {
        min-height: 116px;
        padding: 15px;
      }

      .stat-label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
      }

      .stat-value {
        display: block;
        margin-top: 9px;
        font-size: clamp(1.2rem, 2vw, 1.7rem);
        font-weight: 950;
        word-break: break-word;
      }

      .stat-help {
        display: block;
        margin-top: 7px;
        color: var(--soft);
        font-size: 0.78rem;
      }

      .meter {
        --meter-progress: 0;
        --needle-angle: -180deg;
        --meter-color: var(--brand);
        position: relative;
        height: 150px;
        border-radius: 18px;
        background: var(--surface);
        overflow: hidden;
      }

      .meter svg {
        position: absolute;
        inset: 12px;
        width: calc(100% - 24px);
        height: calc(100% - 12px);
        overflow: visible;
      }

      .meter path {
        fill: none;
        stroke-linecap: round;
        stroke-width: 15;
      }

      .meter-track {
        stroke: color-mix(in srgb, var(--ink), transparent 88%);
      }

      .meter-progress {
        stroke: var(--meter-color);
        stroke-dasharray: var(--meter-progress) 100;
        transition: stroke-dasharray 700ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      .meter-needle {
        position: absolute;
        left: 50%;
        bottom: 30px;
        width: 76px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, var(--ink), var(--meter-color));
        transform-origin: 0 50%;
        transform: rotate(var(--needle-angle));
        transition: transform 700ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      .meter-label {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        text-align: center;
      }

      .meter-label strong {
        display: block;
        font-size: 1.4rem;
      }

      .section-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      .insight-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .insight-card {
        padding: 15px;
      }

      .insight-card strong {
        display: block;
        margin-bottom: 8px;
      }

      .insight-card p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .chart {
        width: 100%;
        min-height: 230px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
      }

      .bar-track,
      .progress-track {
        height: 10px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--brand), transparent 88%);
        overflow: hidden;
      }

      .bar-fill,
      .progress-fill {
        height: 100%;
        border-radius: inherit;
        background: var(--brand);
      }

      .burn-grid {
        display: grid;
        gap: 14px;
      }

      .health-table,
      .transactions-table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 14px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
      }

      th {
        color: var(--muted);
        font-size: 0.76rem;
        text-transform: uppercase;
      }

      td.numeric,
      th.numeric {
        text-align: right;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 0 10px;
        font-size: 0.76rem;
        font-weight: 900;
        background: color-mix(in srgb, var(--ok), transparent 84%);
        color: var(--ok);
      }

      .status-pill.watch {
        background: color-mix(in srgb, var(--warn), transparent 84%);
        color: var(--warn);
      }

      .status-pill.overspent {
        background: color-mix(in srgb, var(--danger), transparent 84%);
        color: var(--danger);
      }

      .filters {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 180px 160px;
        gap: 10px;
      }

      .transaction-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .empty-state {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 20px;
        align-items: center;
        min-height: 420px;
        padding: 28px;
      }

      .empty-state h2 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 4.2rem);
        line-height: 1;
      }

      .empty-state p {
        max-width: 680px;
        color: var(--muted);
        line-height: 1.55;
      }

      .empty-visual {
        min-height: 260px;
        border-radius: 26px;
        background:
          radial-gradient(circle at 50% 28%, color-mix(in srgb, var(--brand), transparent 60%), transparent 42%),
          var(--surface);
        border: 1px solid var(--line);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        place-items: center;
        padding: 16px;
        background: rgba(0, 0, 0, 0.55);
      }

      .modal-backdrop.open {
        display: grid;
      }

      .modal {
        width: min(560px, 100%);
        max-height: calc(100vh - 32px);
        overflow: auto;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 850;
      }

      .amount-field {
        position: relative;
      }

      .amount-field span {
        position: absolute;
        left: 12px;
        bottom: 12px;
        color: var(--muted);
        font-weight: 900;
      }

      .amount-field input {
        padding-left: 32px;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 11px;
        color: var(--ink);
        background: var(--surface);
        font-weight: 800;
      }

      .toast-stack {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 60;
        display: grid;
        gap: 10px;
      }

      .toast {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px 14px;
        color: var(--ink);
        background: var(--panel-strong);
        box-shadow: var(--shadow);
      }

      .floating-add {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 30;
        display: none;
        border-radius: 999px;
      }

      .mobile-cards {
        display: none;
      }

      @media (max-width: 1180px) {
        .app-shell {
          grid-template-columns: 86px minmax(0, 1fr);
        }

        .sidebar {
          padding: 18px 10px;
        }

        .brand-block div,
        .nav-item span {
          display: none;
        }

        .nav-item {
          justify-content: center;
        }

        .content-grid,
        .hero-grid,
        .section-grid {
          grid-template-columns: 1fr;
        }

        .kpi-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .app-shell {
          display: block;
        }

        .sidebar {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .brand-block div,
        .nav-item span {
          display: block;
        }

        .nav-list {
          display: flex;
          overflow-x: auto;
        }

        .nav-item {
          flex: 0 0 auto;
        }

        .main {
          padding: 14px;
        }

        .topbar,
        .topbar-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .kpi-grid,
        .filters,
        .form-grid,
        .empty-state,
        .insight-grid {
          grid-template-columns: 1fr;
        }

        .transactions-table {
          display: none;
        }

        .mobile-cards {
          display: grid;
          gap: 10px;
        }

        .floating-add {
          display: inline-flex;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell" id="app-shell"></div>
    <div class="modal-backdrop" id="modal-root"></div>
    <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
    <button class="primary-button floating-add" id="floating-add" type="button">+ Add Expense</button>

    <script>
      const storageKey = "rupee-command-center-saas-v1";
      const themeStorageKey = "rupee-command-center-theme";
      const quickCategories = ["Food", "Rent", "Travel", "Shopping", "Bills", "Subscriptions", "Health", "Other"];
      const formatter = new Intl.NumberFormat("en-IN", {
        style: "currency",
        currency: "INR",
        maximumFractionDigits: 0,
      });

      const demoState = {
        salary: 125000,
        plannedBudget: 78000,
        budget: {
          Rent: 32000,
          Food: 16000,
          Travel: 9000,
          Shopping: 8000,
          Bills: 6500,
          Subscriptions: 2500,
          Health: 4000,
        },
        expenses: [
          expense("Apartment rent", "Rent", 32000, "2026-04-01", "Monthly rent"),
          expense("BigBasket", "Food", 4200, "2026-04-03", "Groceries and staples"),
          expense("Metro card", "Travel", 1800, "2026-04-05", "Commute recharge"),
          expense("Amazon", "Shopping", 5200, "2026-04-09", "Work bag"),
          expense("Electricity board", "Bills", 3100, "2026-04-11", "Monthly utility"),
          expense("Cult.fit", "Health", 2200, "2026-04-13", "Fitness membership"),
          expense("Swiggy", "Food", 1350, "2026-04-16", "Dinner"),
          expense("Netflix", "Subscriptions", 649, "2026-04-18", "Streaming"),
        ],
      };

      let state = loadState();
      let activeTheme = localStorage.getItem(themeStorageKey) || "dark";
      let activeView = "Overview";
      let selectedMonth = localStorage.getItem("rupee-command-center-month") || currentMonth();
      let filters = { search: "", category: "All", month: selectedMonth };
      let editingExpenseId = null;
      let planDraft = null;

      applyTheme(activeTheme);
      renderAppShell();
      render();

      function expense(merchant, category, amount, date, description) {
        return {
          id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
          merchant,
          category,
          amount,
          date,
          description,
        };
      }

      function loadState() {
        const saved = localStorage.getItem(storageKey);
        if (!saved) {
          return { salary: 0, plannedBudget: 0, budget: {}, expenses: [] };
        }

        try {
          const parsed = JSON.parse(saved);
          return {
            salary: Number(parsed.salary) || 0,
            plannedBudget: Number(parsed.plannedBudget) || 0,
            budget: parsed.budget || {},
            expenses: (parsed.expenses || []).map((item) => ({
              id: item.id || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())),
              merchant: item.merchant || item.description || "Expense",
              category: item.category || item.Category || "Other",
              amount: Number(item.amount || item.Amount || 0),
              date: item.date || item.Date || currentDate(),
              description: item.description || item.Description || "",
            })),
          };
        } catch {
          return { salary: 0, plannedBudget: 0, budget: {}, expenses: [] };
        }
      }

      function saveState() {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }

      function renderAppShell() {
        document.getElementById("app-shell").innerHTML = AppShell();
        bindShellEvents();
      }

      function AppShell() {
        return `
          <aside class="sidebar">
            <div class="brand-block">
              <div class="brand-mark">₹</div>
              <div>
                <strong>Rupee Command</strong>
                <span>Personal finance OS</span>
              </div>
            </div>
            <nav class="nav-list" aria-label="Primary navigation">
              ${["Overview", "Transactions", "Budgets", "Insights", "Reports", "Settings"]
                .map(
                  (item) => `
                    <button class="nav-item ${activeView === item ? "active" : ""}" data-nav="${item}" type="button">
                      <strong>${navIcon(item)}</strong><span>${item}</span>
                    </button>
                  `,
                )
                .join("")}
            </nav>
          </aside>
          <main class="main">
            <header class="topbar">
              <div>
                <h1>Finance Dashboard</h1>
                <p class="muted">Insight-first budgeting for Indian rupee cash flow.</p>
              </div>
              <div class="topbar-actions">
                <input class="month-picker" id="month-picker" type="month" value="${selectedMonth}" aria-label="Current month" />
                <button class="theme-switch" id="theme-switch" type="button" aria-label="Toggle color theme">
                  <span>${activeTheme === "light" ? "L" : "D"}</span>${activeTheme === "light" ? "Light" : "Dark"}
                </button>
                <button class="icon-button" type="button" aria-label="Settings">⚙</button>
                <div class="avatar" aria-label="Profile">MB</div>
              </div>
            </header>
            <div id="dashboard-root"></div>
          </main>
        `;
      }

      function bindShellEvents() {
        document.querySelectorAll("[data-nav]").forEach((button) => {
          button.addEventListener("click", () => {
            activeView = button.dataset.nav;
            renderAppShell();
            render();
          });
        });

        document.getElementById("theme-switch").addEventListener("click", () => {
          applyTheme(activeTheme === "light" ? "dark" : "light");
          renderAppShell();
          render();
        });

        document.getElementById("month-picker").addEventListener("change", (event) => {
          selectedMonth = event.target.value;
          filters.month = selectedMonth;
          localStorage.setItem("rupee-command-center-month", selectedMonth);
          render();
        });

        document.getElementById("floating-add").addEventListener("click", () => openExpenseModal());
      }

      function render(options = {}) {
        const report = buildReport();
        const root = document.getElementById("dashboard-root");

        if (isEmptyState()) {
          root.innerHTML = EmptyState();
          bindDashboardEvents();
          return;
        }

        root.innerHTML = `
          <div class="content-grid">
            <div class="stack">
              ${HeroMetricCard(report)}
              <section class="kpi-grid">${StatCards(report).join("")}</section>
              ${SmartInsights(report)}
              <section class="section-grid">
                ${ChartCard("Spending Trend", "Daily spending for selected month", SpendingTrendChart(report))}

        return `
          <div class="meter" style="--meter-progress:${rate.toFixed(2)}; --needle-angle:${angle}deg; --meter-color:${color}">
            <svg viewBox="0 0 200 130" aria-hidden="true">
              <path class="meter-track" d="M 20 112 A 80 80 0 0 1 180 112" pathLength="100"></path>
              <path class="meter-progress" d="M 20 112 A 80 80 0 0 1 180 112" pathLength="100"></path>

            </div>

        `;

      function SpendingTrendChart(report) {
        const points = trendPoints(report.transactions);
        if (points.length === 0) {
          return `<p class="muted">Add expenses to see a spending trend.</p>`;
        }
        const max = Math.max(...points.map((point) => point.amount), 1);
        const coords = points
          .map((point, index) => {
            const x = points.length === 1 ? 50 : (index / (points.length - 1)) * 100;
            const y = 100 - (point.amount / max) * 78;
            return `${x},${y}`;
          })
          .join(" ");
        return `
          <svg class="chart" viewBox="0 0 100 112" preserveAspectRatio="none" role="img" aria-label="Spending trend chart">
            <polyline points="0,104 100,104" fill="none" stroke="var(--line)" stroke-width="0.8"></polyline>
            <polyline points="${coords}" fill="none" stroke="var(--brand)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></polyline>
            <polygon points="${coords} 100,104 0,104" fill="color-mix(in srgb, var(--brand), transparent 82%)"></polygon>
          </svg>
        `;
      }

      function CategoryBarChart(report) {
        const categories = [...report.categories].sort((a, b) => b.spent - a.spent).slice(0, 6);
        if (categories.length === 0) {
          return `<p class="muted">Create budget categories to compare spending.</p>`;
        }
        const max = Math.max(...categories.map((item) => item.spent), 1);
        return categories
          .map(
            (item) => `
              <div class="bar-row">
                <strong>${escapeHtml(item.category)}</strong>
                <div class="bar-track"><div class="bar-fill" style="width:${(item.spent / max) * 100}%"></div></div>
                <span class="muted">${money(item.spent)}</span>
              </div>
            `,
          )
          .join("");
      }

      function bindDashboardEvents() {
        document.getElementById("empty-start")?.addEventListener("click", () => {
          state.salary = 1;
          saveState();
          render();
          requestAnimationFrame(() => document.getElementById("salary-field")?.focus());
        });

        document.getElementById("empty-demo")?.addEventListener("click", loadDemo);
        document.getElementById("open-expense")?.addEventListener("click", () => openExpenseModal());
        document.getElementById("open-expense-secondary")?.addEventListener("click", () => openExpenseModal());
        document.getElementById("floating-add").onclick = () => openExpenseModal();
        document.getElementById("open-category")?.addEventListener("click", openCategoryModal);
        document.getElementById("open-category-secondary")?.addEventListener("click", openCategoryModal);
        document.getElementById("preview-demo")?.addEventListener("click", loadDemo);
        document.getElementById("reset-dashboard")?.addEventListener("click", openResetModal);

        document.getElementById("salary-field")?.addEventListener("input", previewPlan);
        document.getElementById("budget-field")?.addEventListener("input", previewPlan);
        document.getElementById("plan-form")?.addEventListener("submit", updatePlan);

        document.getElementById("transaction-search")?.addEventListener("input", (event) => {
          filters.search = event.target.value;
          render();
        });
        document.getElementById("transaction-category")?.addEventListener("change", (event) => {
          filters.category = event.target.value;
          render();
        });
        document.getElementById("transaction-month")?.addEventListener("change", (event) => {
          filters.month = event.target.value;
          render();
        });

        document.querySelectorAll("[data-delete-expense]").forEach((button) => {
          button.addEventListener("click", () => {
            state.expenses = state.expenses.filter((item) => item.id !== button.dataset.deleteExpense);
            saveState();
            toast("Expense deleted");
            render();
          });
        });

        document.querySelectorAll("[data-edit-expense]").forEach((button) => {
          button.addEventListener("click", () => {
            const item = state.expenses.find((expenseItem) => expenseItem.id === button.dataset.editExpense);
            openExpenseModal(item);
          });
        });
      }

      function previewPlan(shouldRender = true) {
        const activeId = document.activeElement?.id;
        const salary = Number(document.getElementById("salary-field").value);
        const budget = Number(document.getElementById("budget-field").value);
        planDraft = { salary, plannedBudget: budget };
        const errors = validatePlan(salary, budget, totalSpent());
        const preview = salary - totalSpent();
        document.getElementById("plan-preview").textContent = money(preview);
        document.getElementById("plan-error").textContent = errors[0] || "Looks good. Update to finalize the monthly plan.";
        document.getElementById("update-plan").disabled = errors.length > 0;
        if (shouldRender) {
          render({ keepPlanDraft: true });
          requestAnimationFrame(() => {
            const activeField = document.getElementById(activeId);
            if (activeField) {
              activeField.focus();
              const end = activeField.value.length;
              activeField.setSelectionRange(end, end);
            }
          });
        }
      }

      function updatePlan(event) {
        event.preventDefault();
        const salary = Number(document.getElementById("salary-field").value);
        const budget = Number(document.getElementById("budget-field").value);
        const errors = validatePlan(salary, budget, totalSpent());
        if (errors.length) {
          toast(errors[0]);
          return;
        }
        state.salary = salary;
        state.plannedBudget = budget;
        planDraft = null;
        saveState();
        toast("Budget updated");
        render();
      }

      function openExpenseModal(item = null) {
        editingExpenseId = item?.id || null;
        openModal(AddExpenseModal(item));
        document.getElementById("expense-form").addEventListener("submit", saveExpenseFromModal);
        document.querySelectorAll("[data-chip-category]").forEach((button) => {
          button.addEventListener("click", () => {
            document.getElementById("expense-category").value = button.dataset.chipCategory;
          });
        });
      }

      function saveExpenseFromModal(event) {
        event.preventDefault();
        const merchant = document.getElementById("expense-merchant").value.trim();
        const category = document.getElementById("expense-category").value;
        const amount = Number(document.getElementById("expense-amount").value);
        const date = document.getElementById("expense-date").value;
        const description = document.getElementById("expense-description").value.trim();

        if (!merchant || !category || !Number.isFinite(amount) || amount <= 0 || !date) {
          toast("Please complete merchant, category, amount, and date");
          return;
        }

        if (!state.budget[category]) {
          state.budget[category] = Math.max(amount, 1);
        }

        const record = { id: editingExpenseId || newId(), merchant, category, amount, date, description };
        if (editingExpenseId) {
          state.expenses = state.expenses.map((item) => (item.id === editingExpenseId ? record : item));
          toast("Expense updated");
        } else {
          state.expenses.push(record);
          toast("Expense added");
        }
        editingExpenseId = null;
        saveState();
        closeModal();
        render();
      }

      function openCategoryModal() {
        openModal(AddCategoryModal());
        document.getElementById("category-form").addEventListener("submit", (event) => {
          event.preventDefault();
          const name = document.getElementById("category-name").value.trim();
          const limit = Number(document.getElementById("category-limit").value);
          if (!name || !Number.isFinite(limit) || limit <= 0) {
            toast("Enter a category name and valid limit");
            return;
          }
          state.budget[name] = limit;
          saveState();
          closeModal();
          toast("Category saved");
          render();
        });
        document.querySelectorAll("[data-chip-name]").forEach((button) => {
          button.addEventListener("click", () => {
            document.getElementById("category-name").value = button.dataset.chipName;
          });
        });
      }

      function openResetModal() {
        openModal(ResetModal());
        const input = document.getElementById("reset-input");
        const confirm = document.getElementById("confirm-reset");
        input.addEventListener("input", () => {
          confirm.disabled = input.value !== "RESET";
        });
        confirm.addEventListener("click", () => {
          state = { salary: 0, plannedBudget: 0, budget: {}, expenses: [] };
          saveState();
          closeModal();
          toast("Dashboard reset");
          render();
        });
      }

      function openModal(content) {
        const root = document.getElementById("modal-root");
        root.innerHTML = content;
        root.classList.add("open");
        root.querySelectorAll("[data-close-modal]").forEach((button) => button.addEventListener("click", closeModal));
        root.addEventListener("click", closeOnBackdrop);
      }

      function closeOnBackdrop(event) {
        if (event.target.id === "modal-root") {
          closeModal();
        }
      }

      function closeModal() {
        const root = document.getElementById("modal-root");
        root.classList.remove("open");
        root.innerHTML = "";
        root.removeEventListener("click", closeOnBackdrop);
      }

      function loadDemo() {
        state = JSON.parse(JSON.stringify(demoState));
        planDraft = null;
        saveState();
        toast("Sample dashboard loaded");
        render();
      }

      function buildReport() {
        const plan = planDraft || { salary: state.salary, plannedBudget: state.plannedBudget };
        const transactions = state.expenses.filter((item) => item.date?.startsWith(selectedMonth));
        const spent = transactions.reduce((sum, item) => sum + Number(item.amount), 0);
        const categories = Object.entries(state.budget).map(([category, limit]) => {
          const categorySpent = transactions
            .filter((item) => item.category === category)
            .reduce((sum, item) => sum + Number(item.amount), 0);
          return {
            category,
            limit: Number(limit),
            spent: categorySpent,
            remaining: Number(limit) - categorySpent,
          };
        });
        const salary = Number(plan.salary) || 0;
        const plannedBudget = Number(plan.plannedBudget) || 0;
        const safeToSpend = plannedBudget - spent;
        const savings = salary - spent;
        const savingsRate = salary > 0 ? (savings / salary) * 100 : 0;
        const budgetUsed = plannedBudget > 0 ? (spent / plannedBudget) * 100 : 0;
        const projectedSavings = salary - projectedSpend(spent);
        return { salary, plannedBudget, spent, safeToSpend, savings, savingsRate, budgetUsed, projectedSavings, categories, transactions };
      }

      function buildInsights(report) {
        const daily = safeDailySpend(report);
        const fastest = [...report.categories].sort((a, b) => b.spent / Math.max(b.limit, 1) - a.spent / Math.max(a.limit, 1))[0];
        const insights = [
          {
            title: "Safe daily spend",
            text: `You can spend ${money(daily)} per day and still stay within budget.`,
          },
          {
            title: "Projected savings",
            text: `At this pace, you are on track to save ${money(report.projectedSavings)} this month.`,
          },
          {
            title: "Budget burn",
            text:
              report.budgetUsed > monthProgress() + 8
                ? "Your budget is being used faster than the month is passing."
                : "Your budget usage is aligned with the month so far.",
          },
        ];
        if (fastest) {
          const usage = fastest.limit > 0 ? (fastest.spent / fastest.limit) * 100 : 0;
          insights.push({
            title: `${fastest.category} needs attention`,
            text: `${fastest.category} is ${Math.round(usage)}% used. ${usage >= 75 ? "Slow down for the rest of the month." : "This category is still healthy."}`,
          });
        }
        return insights.slice(0, 4);
      }

      function trendPoints(transactions) {
        const byDay = new Map();
        transactions.forEach((item) => {
          const day = item.date.slice(-2);
          byDay.set(day, (byDay.get(day) || 0) + Number(item.amount));
        });
        return [...byDay.entries()]
          .sort(([a], [b]) => Number(a) - Number(b))
          .map(([day, amount]) => ({ day, amount }));
      }

      function filteredTransactions(transactions) {
        return transactions
          .filter((item) => (filters.month ? item.date?.startsWith(filters.month) : true))
          .filter((item) => (filters.category === "All" ? true : item.category === filters.category))
          .filter((item) => {
            const query = filters.search.toLowerCase();
            return !query || `${item.merchant} ${item.description}`.toLowerCase().includes(query);
          })
          .sort((a, b) => b.date.localeCompare(a.date));
      }

      function validatePlan(salary, budget, spent) {
        const errors = [];
        if (!Number.isFinite(salary) || salary <= 0) errors.push("Salary must be greater than zero.");
        if (!Number.isFinite(budget) || budget <= 0) errors.push("Spending Budget must be greater than zero.");
        if (salary < spent) errors.push("Salary cannot be less than spending.");
        if (salary < budget) errors.push("Salary cannot be less than Spending Budget.");
        return errors;
      }

      function isEmptyState() {
        return state.salary <= 0 && state.expenses.length === 0 && Object.keys(state.budget).length === 0;
      }

      function heroInsight(report, daily) {
        if (report.safeToSpend < 0) {
          return `You are over budget by ${money(Math.abs(report.safeToSpend))}. Pause optional spends and review watch categories.`;
        }
        return `You can spend ${money(daily)} per day and still stay within budget. ${report.budgetUsed > 75 ? "A few categories need attention." : "You are financially safe this month."}`;
      }

      function safeDailySpend(report) {
        return Math.max(report.safeToSpend, 0) / Math.max(daysRemaining(), 1);
      }

      function projectedSpend(spent) {
        const day = new Date().getDate();
        const days = daysInMonth();
        return day > 0 ? (spent / day) * days : spent;
      }

      function monthProgress() {
        return (new Date().getDate() / daysInMonth()) * 100;
      }

      function daysRemaining() {
        return daysInMonth() - new Date().getDate() + 1;
      }

      function daysInMonth() {
        const [year, month] = selectedMonth.split("-").map(Number);
        return new Date(year, month, 0).getDate();
      }

      function currentMonth() {
        return new Date().toISOString().slice(0, 7);
      }

      function currentDate() {
        return new Date().toISOString().slice(0, 10);
      }

      function money(value) {
        return formatter.format(Number(value) || 0);
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("en-IN", { day: "2-digit", month: "short" }).format(new Date(value));
      }

      function applyTheme(theme) {
        activeTheme = theme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = activeTheme;
        localStorage.setItem(themeStorageKey, activeTheme);
      }

      function navIcon(item) {
        return { Overview: "◎", Transactions: "↕", Budgets: "▣", Insights: "✦", Reports: "▤", Settings: "⚙" }[item];
      }

      function newId() {
        return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function toast(message) {
        const toastNode = document.createElement("div");
        toastNode.className = "toast";
        toastNode.textContent = message;
        document.getElementById("toast-stack").appendChild(toastNode);
        window.setTimeout(() => toastNode.remove(), 2600);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }
    </script>
  </body>
</html>
