<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spending Analyzer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --ink: #172033;
        --muted: #68758a;
        --line: #dce2ea;
        --panel: #ffffff;
        --accent: #0f766e;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        max-width: 640px;
      }

      .status {
        min-width: 140px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px 14px;
        text-align: right;
        color: var(--muted);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .metric,
      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .metric {
        padding: 18px;
      }

      .metric span {
        color: var(--muted);
        display: block;
        font-size: 0.9rem;
        margin-bottom: 8px;
      }

      .metric strong {
        font-size: 1.7rem;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        border-collapse: collapse;
        min-width: 720px;
        width: 100%;
      }

      th,
      td {
        padding: 15px 18px;
        text-align: right;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      th:first-child,
      td:first-child {
        text-align: left;
      }

      th {
        color: var(--muted);
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .ok {
        color: var(--accent);
        font-weight: 700;
      }

      .danger {
        color: var(--danger);
        font-weight: 700;
      }

      @media (max-width: 720px) {
        header {
          align-items: stretch;
          flex-direction: column;
        }

        .status {
          text-align: left;
        }

        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Spending Analyzer</h1>
          <p class="subtitle">April sample budget overview</p>
        </div>
        <div class="status" id="status">Loading report...</div>
      </header>

      <section class="summary-grid" aria-label="Budget summary">
        <div class="metric">
          <span>Total Budget</span>
          <strong id="total-budget">$0.00</strong>
        </div>
        <div class="metric">
          <span>Total Spent</span>
          <strong id="total-spent">$0.00</strong>
        </div>
        <div class="metric">
          <span>Remaining</span>
          <strong id="total-remaining">$0.00</strong>
        </div>
      </section>

      <section class="table-wrap" aria-label="Category budget report">
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Allocated Budget</th>
              <th>Total Spent</th>
              <th>Remaining</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="report-body"></tbody>
        </table>
      </section>
    </main>

    <script>
      const currency = new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
      });

      function setText(id, value) {
        document.getElementById(id).textContent = value;
      }

      function renderReport(report) {
        setText("total-budget", currency.format(report.totals.budget));
        setText("total-spent", currency.format(report.totals.spent));
        setText("total-remaining", currency.format(report.totals.remaining));

        const rows = report.categories
          .map((item) => {
            const statusClass = item.overspent ? "danger" : "ok";
            const statusText = item.overspent ? "Overspent" : "OK";

            return `
              <tr>
                <td>${item.category}</td>
                <td>${currency.format(item.budget)}</td>
                <td>${currency.format(item.spent)}</td>
                <td>${currency.format(item.remaining)}</td>
                <td class="${statusClass}">${statusText}</td>
              </tr>
            `;
          })
          .join("");

        document.getElementById("report-body").innerHTML = rows;
      }

      async function loadReport() {
        const status = document.getElementById("status");

        try {
          const response = await fetch("/api/report");
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.errors?.join(" ") || "Report failed.");
          }

          renderReport(payload.report);
          status.textContent = "Sample data loaded";
        } catch (error) {
          status.textContent = error.message;
          status.classList.add("danger");
        }
      }

      loadReport();
    </script>
  </body>
</html>
